###############################################################################
# Sonarr (TV) + Radarr (Movies) — Kubernetes Deployments + Services
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
  labels:
    app: sonarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Chicago"
          ports:
            - containerPort: 8989
              name: web
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /mnt/media
            - name: tv
              mountPath: /tv
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          hostPath:
            path: ${CONFIG_PATH}/sonarr
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: ${MEDIA_PATH}
            type: DirectoryOrCreate
        - name: tv
          hostPath:
            path: ${MEDIA_PATH}/tvshows
            type: DirectoryOrCreate
        - name: downloads
          hostPath:
            path: ${DOWNLOADS_PATH}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: media
spec:
  selector:
    app: sonarr
  ports:
    - port: 8989
      targetPort: 8989
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
  labels:
    app: radarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Chicago"
          ports:
            - containerPort: 7878
              name: web
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /mnt/media
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          hostPath:
            path: ${CONFIG_PATH}/radarr
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: ${MEDIA_PATH}
            type: DirectoryOrCreate
        - name: downloads
          hostPath:
            path: ${DOWNLOADS_PATH}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: media
spec:
  selector:
    app: radarr
  ports:
    - port: 7878
      targetPort: 7878
  type: NodePort

