###############################################################################
# Plex Media Server — Kubernetes Deployment
# Uses hostNetwork for DLNA discovery (same as compose host mode)
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: media
  labels:
    app: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      hostNetwork: true
      containers:
        - name: plex
          image: plexinc/pms-docker:latest
          env:
            - name: TZ
              value: "America/Chicago"
            - name: PLEX_UID
              value: "1000"
            - name: PLEX_GID
              value: "1000"
            - name: PLEX_CLAIM
              valueFrom:
                secretKeyRef:
                  name: media-secrets
                  key: plex-claim
                  optional: true
          ports:
            - containerPort: 32400
              name: plex-web
          volumeMounts:
            - name: config
              mountPath: /config
            - name: transcode
              mountPath: /transcode
            - name: media
              mountPath: /data
      volumes:
        - name: config
          hostPath:
            path: ${PLEX_CONFIG_PATH}
            type: DirectoryOrCreate
        - name: transcode
          hostPath:
            path: ${PLEX_TRANSCODE_PATH}
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: ${MEDIA_PATH}
            type: DirectoryOrCreate

