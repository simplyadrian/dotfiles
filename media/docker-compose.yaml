###############################################################################
# Media Stack — Docker Compose
# Compatible with macOS Big Sur+ (no Rancher/K8s required)
#
# Usage:
#   cp .env.example .env   # edit paths
#   docker compose up -d
###############################################################################

services:
  ###########################################################################
  # Plex Media Server
  ###########################################################################
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: host                     # required for DLNA discovery
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Chicago}
      PLEX_UID: ${PUID:-1000}
      PLEX_GID: ${PGID:-1000}
      PLEX_CLAIM: ${PLEX_CLAIM:-}
    volumes:
      - ${PLEX_CONFIG_PATH:-~/docker/configs/plex}:/config
      - ${PLEX_TRANSCODE_PATH:-/tmp/plex-transcode}:/transcode
      - ${MEDIA_PATH:-/mnt/media}:/data

  ###########################################################################
  # Transmission — torrent client
  ###########################################################################
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Chicago}
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    volumes:
      - ${CONFIG_PATH:-~/docker/configs}/transmission:/config
      - ${DOWNLOADS_PATH:-~/Torrents}:/downloads

  ###########################################################################
  # Sonarr — TV show management
  ###########################################################################
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Chicago}
    ports:
      - "8989:8989"
    volumes:
      - ${CONFIG_PATH:-~/docker/configs}/sonarr:/config
      - ${MEDIA_PATH:-/mnt/media}:/mnt/media
      - ${DOWNLOADS_PATH:-~/Torrents}:/mnt/downloads

  ###########################################################################
  # Radarr — movie management
  ###########################################################################
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Chicago}
    ports:
      - "7878:7878"
    volumes:
      - ${CONFIG_PATH:-~/docker/configs}/radarr:/config
      - ${MEDIA_PATH:-/mnt/media}:/mnt/media
      - ${DOWNLOADS_PATH:-~/Torrents}:/mnt/downloads

  ###########################################################################
  # Prowlarr — indexer manager (feeds Sonarr / Radarr)
  ###########################################################################
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Chicago}
    ports:
      - "9696:9696"
    volumes:
      - ${CONFIG_PATH:-~/docker/configs}/prowlarr:/config

  ###########################################################################
  # Flaresolverr — Cloudflare bypass (used by Prowlarr)
  ###########################################################################
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: ${TZ:-America/Chicago}
    ports:
      - "8191:8191"

  ###########################################################################
  # Bazarr — subtitle management
  ###########################################################################
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Chicago}
    ports:
      - "6767:6767"
    volumes:
      - ${CONFIG_PATH:-~/docker/configs}/bazarr:/config
      - ${MEDIA_PATH:-/mnt/media}:/mnt/media

  ###########################################################################
  # Overseerr — request management (Plex-compatible)
  ###########################################################################
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Chicago}
    ports:
      - "5055:5055"
    volumes:
      - ${CONFIG_PATH:-~/docker/configs}/overseerr:/config

